<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Site avatar</title>
  <desc id="desc">Abstract mint and cyan profile artwork on a dark background.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#071014"/>
      <stop offset="55%" stop-color="#0d1f22"/>
      <stop offset="100%" stop-color="#040608"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#53f3c3"/>
      <stop offset="100%" stop-color="#4cc9ff"/>
    </linearGradient>
    <radialGradient id="core" cx="50%" cy="38%" r="60%">
      <stop offset="0%" stop-color="#d9fff5" stop-opacity="0.95"/>
      <stop offset="45%" stop-color="#7affdd" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#53f3c3" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <rect width="512" height="512" rx="128" fill="url(#bg)"/>

  <circle cx="256" cy="256" r="188" fill="none" stroke="#163a37" stroke-width="20"/>
  <circle cx="256" cy="256" r="176" fill="none" stroke="url(#glow)" stroke-width="8" opacity="0.9"/>

  <circle cx="256" cy="196" r="86" fill="url(#core)" filter="url(#blur)" opacity="0.9"/>
  <path d="M160 364c18-58 60-94 96-94s78 36 96 94" fill="none" stroke="url(#glow)" stroke-linecap="round" stroke-width="32"/>
  <circle cx="256" cy="196" r="62" fill="none" stroke="url(#glow)" stroke-width="24" stroke-linecap="round"/>

  <path d="M124 140c58-36 122-54 190-50" fill="none" stroke="#53f3c3" stroke-opacity="0.18" stroke-linecap="round" stroke-width="14"/>
  <path d="M188 410c82 20 150 6 212-44" fill="none" stroke="#4cc9ff" stroke-opacity="0.18" stroke-linecap="round" stroke-width="14"/>
</svg>
