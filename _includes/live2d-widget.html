<div
  id="live2d-assistant"
  data-turbo-permanent
  style="z-index: 80;"
  data-model="{{ site.live2d.model | relative_url }}"
  data-desktop-left="{{ site.live2d.desktop_left_rem | default: 0.35 }}"
  data-desktop-bottom="{{ site.live2d.desktop_bottom_rem | default: 0.4 }}"
  data-desktop-width="{{ site.live2d.desktop_width | default: 250 }}"
  data-desktop-zoom="{{ site.live2d.desktop_zoom | default: 1.9 }}"
  data-desktop-y-ratio="{{ site.live2d.desktop_y_ratio | default: 1.46 }}"
  data-mobile-width="{{ site.live2d.mobile_width | default: 150 }}"
  data-mobile-bottom="{{ site.live2d.mobile_bottom_rem | default: 0.15 }}"
  data-mobile-zoom="{{ site.live2d.mobile_zoom | default: 1.65 }}"
  data-mobile-y-ratio="{{ site.live2d.mobile_y_ratio | default: 1.34 }}"
  aria-hidden="true"
></div>

<script type="module" src="https://cdn.jsdelivr.net/npm/@hotwired/turbo@8.0.23/dist/turbo.es2017-esm.min.js" data-turbo-track="reload"></script>
<script src="{{ site.live2d.cubism_core | relative_url }}" data-turbo-eval="false"></script>
<script src="https://cdn.jsdelivr.net/npm/pixi.js@6.5.10/dist/browser/pixi.min.js" data-turbo-eval="false"></script>
<script src="https://cdn.jsdelivr.net/npm/pixi-live2d-display@0.4.0/dist/cubism4.min.js" data-turbo-eval="false"></script>
<script src="{{ '/assets/js/live2d-widget.js' | relative_url }}?v=20260609-live2d-persist" data-turbo-eval="false"></script>
