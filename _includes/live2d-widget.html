<div
  id="live2d-assistant"
  data-model="{{ site.live2d.model | relative_url }}"
  data-desktop-left="{{ site.live2d.desktop_left_rem | default: 17 }}"
  data-desktop-width="{{ site.live2d.desktop_width | default: 320 }}"
  data-mobile-width="{{ site.live2d.mobile_width | default: 180 }}"
  aria-hidden="true"
></div>

<script src="{{ site.live2d.cubism_core | relative_url }}"></script>
<script src="https://cdn.jsdelivr.net/npm/pixi.js@6.5.10/dist/browser/pixi.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pixi-live2d-display@0.4.0/dist/cubism4.min.js"></script>
<script src="{{ '/assets/js/live2d-widget.js' | relative_url }}"></script>
